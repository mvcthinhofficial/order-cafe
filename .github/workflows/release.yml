name: Release Order Cafe

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-electron:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install
      - name: Build Electron App
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run electron:build -- --publish never
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-assets-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest*.yml

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install
      - name: Build Frontend
        run: npm run build
      - name: Create Linux Bundle
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Building Linux bundle for version: $VERSION"

          # Kiểm tra các file bắt buộc trước khi tar
          echo "Kiểm tra các file cần thiết..."
          for f in dist server.cjs db.cjs migration.cjs package.json package-lock.json; do
            if [ ! -e "$f" ]; then
              echo "LỖI: File bắt buộc không tồn tại: $f"
              exit 1
            fi
          done

          # Tạo danh sách file sẽ đưa vào bundle
          # KHÔNG bao gồm:
          #   - node_modules/ → binary native (better-sqlite3) biên dịch trên Ubuntu CI
          #     sẽ KHÔNG tương thích với server Linux khác distro/arch.
          #   - deploy_linux.sh → script chạy trên Mac developer, không chạy trên Linux server
          TAR_FILES="dist server.cjs db.cjs migration.cjs package.json package-lock.json"

          # src/utils/ — bắt buộc (server.cjs require taxUtils.cjs, timeUtils.cjs)
          [ -d src/utils ] && TAR_FILES="$TAR_FILES src/utils" || echo "CẢNH BÁO: src/utils/ không tồn tại"

          # public/ — tùy chọn (logo, manifest)
          [ -d public ] && TAR_FILES="$TAR_FILES public" || echo "CẢNH BÁO: public/ không tồn tại"

          # routes/ — tùy chọn (paymentWebhook.cjs nếu tách riêng)
          [ -d routes ] && TAR_FILES="$TAR_FILES routes" || true

          # server/ — BẮT BUỘC (authRoutes.cjs và các module backend mới)
          # server.cjs require('./server/routes/authRoutes.cjs') — thiếu file này → crash
          [ -d server ] && TAR_FILES="$TAR_FILES server" || echo "CẢNH BÁO: server/ không tồn tại"

          # LINUX_DEPLOYMENT_GUIDE.md — documentation
          [ -f LINUX_DEPLOYMENT_GUIDE.md ] && TAR_FILES="$TAR_FILES LINUX_DEPLOYMENT_GUIDE.md" || echo "CẢNH BÁO: LINUX_DEPLOYMENT_GUIDE.md không tồn tại"

          BUNDLE_NAME="order-cafe-v${VERSION}.tar.gz"
          echo "Các file sẽ được đóng gói: $TAR_FILES"
          tar -czf "$BUNDLE_NAME" $TAR_FILES
          echo "Bundle created: $BUNDLE_NAME ($(du -sh $BUNDLE_NAME | cut -f1))"
          ls -lh "$BUNDLE_NAME"
      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-asset
          path: order-cafe-v*.tar.gz

  publish:
    needs: [build-electron, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-assets
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: all-assets/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
