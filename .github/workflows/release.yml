name: Release Order Cafe

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-electron:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install
      - name: Build Electron App
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run electron:build -- --publish never
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-assets-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/latest*.yml

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install
      - name: Obfuscate Server Code
        run: npm run obfuscate
      - name: Create Linux Bundle
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          tar -czf order-cafe-v$VERSION.tar.gz server.cjs package.json package-lock.json
      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-asset
          path: order-cafe-v*.tar.gz

  publish:
    needs: [build-electron, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-assets
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: all-assets/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
